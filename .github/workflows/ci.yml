name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  windows-node-validation:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 16.13.0
          - 18

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
